# 카나리 로컬 개발 환경
# 실행: docker compose up -d
# 종료: docker compose down   (데이터까지 지우려면 docker compose down -v)
services:

  mysql:
    image: mysql:8.4
    container_name: kanari-mysql
    environment:
      MYSQL_ROOT_PASSWORD: kanari-dev
      MYSQL_DATABASE: kanari
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  # Kafka 4.x는 Zookeeper 없이 KRaft 모드로 브로커 1대만으로 뜬다.
  # 로컬 개발과 소규모 운영에는 브로커 1대면 충분하다.
  kafka:
    image: apache/kafka:3.9.0
    container_name: kanari-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # 호스트를 비우면(//:포트) 모든 인터페이스에 바인딩된다. 0.0.0.0으로 적으면
      # 이 이미지의 설정 검증이 기동을 거부한다 (advertised 검증에 걸림)
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,EXTERNAL://:9092
      # 컨테이너 안(kafka:19092)과 호스트(localhost:9092) 양쪽에서 접속할 수 있게 리스너를 나눈다
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data

  # 토픽과 메시지를 눈으로 확인하는 웹 UI (http://localhost:8080)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kanari-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: kanari-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
    depends_on:
      - kafka

  # 유사 장애 검색용 벡터 DB. Phase 4 후반(의미 기반 검색)에서 사용한다
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: kanari-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  mysql-data:
  kafka-data:
  qdrant-data:
