# Grafana가 처음 뜰 때 자동으로 등록되는 데이터소스.
# 수동 클릭 설정 대신 파일로 두면(provisioning) 환경을 지웠다 만들어도 재현된다.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
